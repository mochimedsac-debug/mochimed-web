<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificación de Constancia | MOCHIMED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --azul: #162d4a;
      --gris: #52677d;
      --oro: #b8860b;
      --verde: #12805c;
      --rojo: #b42318;
      --fondo: #f6f8fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--fondo);
      color: var(--azul);
    }
    .container {
      max-width: 820px;
      margin: 36px auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 10px 28px rgba(22, 45, 74, 0.12);
      border-top: 6px solid var(--oro);
    }
    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .tagline {
      color: var(--gris);
      margin-bottom: 28px;
      font-size: 15px;
    }
    .box {
      padding: 18px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .valid {
      background: #ecfdf3;
      border-left: 6px solid var(--verde);
      color: #064e3b;
    }
    .invalid {
      background: #fef3f2;
      border-left: 6px solid var(--rojo);
      color: #7a271a;
    }
    .row {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid #e6ebf1;
      font-size: 16px;
    }
    .label {
      color: var(--gris);
      font-weight: 700;
    }
    .code {
      font-family: Consolas, Monaco, monospace;
      background: #eef2f6;
      color: var(--azul);
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      background: var(--azul);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(22,45,74,0.16);
    }
    .btn.secondary {
      background: #ffffff;
      color: var(--azul);
      border: 1px solid #c9d3df;
      box-shadow: none;
    }
    .notice {
      margin-top: 14px;
      color: var(--gris);
      font-size: 13px;
      line-height: 1.5;
    }
    .footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #e6ebf1;
      color: var(--gris);
      font-size: 13px;
      line-height: 1.5;
    }
    a { color: var(--azul); }
    @media (max-width: 640px) {
      .container { margin: 16px; padding: 22px; }
      .row { grid-template-columns: 1fr; gap: 4px; }
      .brand { font-size: 24px; }
      .actions { display: block; }
      .btn { display: block; text-align: center; margin-bottom: 10px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="brand">MOCHIMED</div>
    <div class="tagline">Protección radiológica e ingeniería especializada</div>

    <section id="resultado">
      <div class="box">Verificando constancia...</div>
    </section>

    <div class="footer">
      Esta consulta confirma que la constancia se encuentra registrada en la base digital de MOCHIMED.
      <br>Web oficial: <a href="https://www.mochimed.com.pe">www.mochimed.com.pe</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const resultado = document.getElementById("resultado");

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, function (m) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[m];
      });
    }

    function buildDownloadButton(c) {
      if (!c.archivo_constancia) return "";
      const archivo = escapeHTML(c.archivo_constancia);
      return `
        <div class="actions">
          <a class="btn" href="${archivo}" download>Descargar constancia</a>
          <a class="btn secondary" href="${archivo}" target="_blank" rel="noopener">Ver constancia</a>
        </div>
        <div class="notice">
          La descarga corresponde al archivo PNG registrado para este código de verificación.
        </div>
      `;
    }

    if (!id) {
      resultado.innerHTML = `
        <div class="box invalid">
          <h2>No se ingresó código de constancia</h2>
          <p>Verifique que el enlace o QR contenga un código válido.</p>
        </div>
      `;
    } else {
      fetch("data/constancias.json")
        .then(response => {
          if (!response.ok) throw new Error("No se pudo cargar la base de datos.");
          return response.json();
        })
        .then(data => {
          const c = data.find(item => item.codigo === id);

          if (c) {
            resultado.innerHTML = `
              <div class="box valid">
                <h2>Constancia válida</h2>
                <p>La constancia se encuentra registrada en MOCHIMED.</p>
              </div>

              <div class="row"><div class="label">Código</div><div><span class="code">${escapeHTML(c.codigo)}</span></div></div>
              <div class="row"><div class="label">Participante</div><div>${escapeHTML(c.nombres)}</div></div>
              <div class="row"><div class="label">Curso / charla</div><div>${escapeHTML(c.curso)}</div></div>
              <div class="row"><div class="label">Modalidad</div><div>${escapeHTML(c.modalidad)}</div></div>
              <div class="row"><div class="label">Fecha del curso</div><div>${escapeHTML(c.fecha_curso)}</div></div>
              <div class="row"><div class="label">Duración</div><div>${escapeHTML(c.duracion)}</div></div>
              <div class="row"><div class="label">Lugar / sede</div><div>${escapeHTML(c.lugar)}</div></div>
              <div class="row"><div class="label">Fecha de emisión</div><div>${escapeHTML(c.fecha_emision)}</div></div>
              <div class="row"><div class="label">Estado</div><div>${escapeHTML(c.estado)}</div></div>

              ${buildDownloadButton(c)}
            `;
          } else {
            resultado.innerHTML = `
              <div class="box invalid">
                <h2>Constancia no encontrada</h2>
                <p>El código <span class="code">${escapeHTML(id)}</span> no se encuentra registrado en la base digital de MOCHIMED.</p>
              </div>
            `;
          }
        })
        .catch(() => {
          resultado.innerHTML = `
            <div class="box invalid">
              <h2>Error de verificación</h2>
              <p>No se pudo consultar la base de constancias. Revise que el archivo <span class="code">data/constancias.json</span> esté publicado correctamente.</p>
            </div>
          `;
        });
    }
  </script>
</body>
</html>
